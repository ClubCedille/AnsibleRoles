- name: Create the OpenVPN server
  oxlorg.opnsense.openvpn_server:
    firewall: "{{ vm_net.ip }}"
    api_key: "{{ api_key }}"
    api_secret: "{{ api_secret }}"
    name: "{{ item.name }}"
    server_ip4: "{{ item.subnet }}"
    protocol: "udp4"
    port: "{{ item.port }}"
    address: "{{ vm_net.vip }}"
    mode: "tun"
    topology: "subnet"
    certificate: "{{ item.certificate }}"
    key: "{{ item.name }} - key"
    verify_remote_certificate: true
    network_local: "{{ item.local_networks }}"
    auth_mode:
      - "Local Database"
    auth_group: "{{ item.user_group }}"
    push_options:
      - "register-dns"
    domain: "etsmtl.club"
    dns_servers:
      - "1.1.1.1"
      - "8.8.8.8"
    verify_client_cert: "require"
    cert_depth: 2
    register_dns: true
    user_as_cn: true
    user_cn_strict: false
    state: present
  loop: "{{ opnsense_openvpn }}"

- name: Allow inbound OpenVPN traffic on WAN
  oxlorg.opnsense.rule:
    firewall: "{{ vm_net.ip }}"
    api_key: "{{ api_key }}"
    api_secret: "{{ api_secret }}"
    match_fields: ["description"]
    interface: "wan"
    action: "pass"
    direction: "in"
    ip_protocol: "inet"
    source_net: "any"
    destination_net: "{{ vm_net.vip }}"
    destination_port: "{{ item.port }}"
    protocol: "UDP"
    description: "Allow OpenVPN inbound traffic - {{ item.name }}"
  loop: "{{ opnsense_openvpn }}"

- name: Allow OpenVPN traffic to local networks
  oxlorg.opnsense.rule:
    firewall: "{{ vm_net.ip }}"
    api_key: "{{ api_key }}"
    api_secret: "{{ api_secret }}"
    match_fields: ["description"]
    interface: "openvpn"
    action: "pass"
    direction: "in"
    ip_protocol: "inet"
    source_net: "{{ item.subnet }}"
    destination_net: "any"
    protocol: "any"
    description: "Allow local networks traffic to OpenVPN clients"
  loop: "{{ opnsense_openvpn }}"


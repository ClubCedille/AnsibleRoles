- name: Allow OpenVPN traffic via the interface
  oxlorg.opnsense.rule:
    firewall: "{{ vm_net.ip }}"
    api_key: "{{ api_key }}"
    api_secret: "{{ api_secret }}"
    match_fields: ["description"]
    interface: "{{ item.interface_name }}"
    action: "pass"
    direction: "in"
    source_net: "{{ item.subnet }}"
    destination_net: "any"
    ip_protocol: "inet"
    protocol: "any"
    description: "Allow OpenVPN traffic via {{ item.interface_name }} - {{ item.name }} in"
  loop: "{{ opnsense_openvpn }}"

- name: Allow OpenVPN traffic via the interface
  oxlorg.opnsense.rule:
    firewall: "{{ vm_net.ip }}"
    api_key: "{{ api_key }}"
    api_secret: "{{ api_secret }}"
    match_fields: ["description"]
    interface: "{{ item.interface_name }}"
    action: "pass"
    direction: "out"
    source_net: "{{ item.subnet }}"
    destination_net: "any"
    ip_protocol: "inet"
    protocol: "any"
    description: "Allow OpenVPN traffic via {{ item.interface_name }} - {{ item.name }} out"
  loop: "{{ opnsense_openvpn }}"

---

- name: Create the static key for OpenVPN
  oxlorg.opnsense.openvpn_static_key:
    firewall: "{{ vm_net.ip }}"
    api_key: "{{ api_key }}"
    api_secret: "{{ api_secret }}"
    name: "{{ item.name }} - key"
    mode: "auth"
  loop: "{{ opnsense_openvpn }}"


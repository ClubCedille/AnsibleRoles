---

- name: Configure management VLAN
  block:
    - name: Creating VLAN
      cisco.ios.ios_vlans:
        config:
          - name: vlan_{{ mgmt_vlan }}
            vlan_id: "{{ mgmt_vlan }}"
            state: active
            shutdown: disabled
    - name: Using DHCP for address assignment
      cisco.ios.ios_config:
        lines:
          - ip address dhcp
        parents:
          - interface Vlan{{ mgmt_vlan }}

- name: Configure access VLAN
  loop: "{{ access_vlans }}"
  cisco.ios.ios_vlans:
    config:
      - name: vlan_{{ item }}
        vlan_id: "{{ item }}"
        state: active
        shutdown: disabled

- name: Configure extra VLAN
  loop: "{{ extra_vlans }}"
  cisco.ios.ios_vlans:
    config:
      - name: vlan_{{ item }}
        vlan_id: "{{ item }}"
        state: active
        shutdown: disabled

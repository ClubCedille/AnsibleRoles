---

- name: Configure management VLAN
  block:
    - name: Creating VLAN
      cisco.ios.ios_vlans:
        config:
          - name: vlan_{{ vlans[0] }}
            vlan_id: "{{ vlans[0] }}"
            state: active
            shutdown: disabled
    - name: Using DHCP for address assignment
      cisco.ios.ios_config:
        lines:
          - ip address dhcp
        parents:
          - interface Vlan{{ vlans[0] }}

---

pnp_server_http:
  device_map_path: /var/lib/cisco-pnp/device-map.yaml
  profiles_src_dir: /var/lib/cisco-pnp/profiles
  configs_src_dir: /var/lib/cisco-pnp/configs
  public_host: "{{ ansible_default_ipv4.address }}"
  image_url: "http://{{ pnp_server_http.public_host }}:{{ pnp_server_backend.bind.port }}/images"
  config_url: "http://{{ pnp_server_http.public_host }}:{{ pnp_server_backend.bind.port }}/configs"

pnp_server_day0:
  profiles_source_group: cisco_bootstrapped
  devices_source_group: cisco_bootstrapped
  require_identifier: true
  validate_unique_serial: true
  validate_unique_mac: true
  site:
    domain_name: ""
    name_servers: []
    ntp_servers: []
  mgmt_svi_vlan_id: 100
  # Each entry should define:
  # - name
  # - hostname
  # - admin_password
  # Optional fields: description, mgmt_default_gateway, mgmt_svi_ip_address, mgmt_svi_ip_mask
  # When non-empty, this list takes precedence over host vars.
  profiles: []
  # Each entry should define:
  # - profile (string)
  # - and at least one identifier: serial or mac
  # Optional fields: hostname, site
  # When non-empty, this list takes precedence over host vars.
  devices: []

pnp_server_backend:
  enabled: true
  bind:
    address: "0.0.0.0"
    port: 9191
  base_dir: /var/lib/cisco-pnp
  bundle_dir: "{{ pnp_server_backend.base_dir }}/pnp"
  git:
    repo: https://github.com/GreatSymphonia/pnp-server.git
    version: 2e915503ef02855754284868bda2e70d73976784
    checkout_dir: "{{ pnp_server_backend.base_dir }}/src/pnp-server"
  user: pnp
  group: pnp
  venv_dir: "{{ pnp_server_backend.base_dir }}/venv"
  log_dir: "{{ pnp_server_backend.base_dir }}/log"
  log_file: "{{ pnp_server_backend.log_dir }}/pnp_debug.log"
  script_path: "{{ pnp_server_backend.bundle_dir }}/open-pnp.py"
  config_path: "{{ pnp_server_backend.bundle_dir }}/open-pnp.toml"
  images_path: "{{ pnp_server_backend.bundle_dir }}/images.toml"
  service_name: pnp-server
  pip_packages:
    - flask
    - xmltodict
    - requests
    - ifaddr
    - tomli

pnp_server_images: []

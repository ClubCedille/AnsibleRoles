---
- name: Ensure Garage binary URL is defined
  ansible.builtin.assert:
    that:
      - garage_binary_url | length > 0
    fail_msg: "garage_binary_url must be defined before installing Garage"

- name: Download Garage binary
  ansible.builtin.get_url:
    url: "{{ garage_binary_url }}"
    dest: "/tmp/garage-{{ garage_version }}"
    mode: "0755"

- name: Install Garage binary
  ansible.builtin.copy:
    src: "/tmp/garage-{{ garage_version }}"
    dest: "{{ garage_install_path }}"
    remote_src: true
    mode: "0755"

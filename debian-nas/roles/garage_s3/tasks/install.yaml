---
- name: Ensure Garage binary URL is defined
  ansible.builtin.assert:
    that:
      - garage.binary_url | length > 0
    fail_msg: "garage.binary_url must be defined before installing Garage"

- name: Download Garage binary
  ansible.builtin.get_url:
    url: "{{ garage.binary_url }}"
    dest: "/tmp/garage-{{ garage.version }}"
    mode: "0755"

- name: Install Garage binary
  ansible.builtin.copy:
    src: "/tmp/garage-{{ garage.version }}"
    dest: "{{ garage.paths.install }}"
    remote_src: true
    mode: "0755"

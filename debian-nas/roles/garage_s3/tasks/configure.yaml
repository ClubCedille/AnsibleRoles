---
- name: Ensure Garage group exists
  ansible.builtin.group:
    name: garage
    state: present

- name: Ensure Garage user exists
  ansible.builtin.user:
    name: garage
    group: garage
    system: true
    shell: /usr/sbin/nologin
    create_home: false
    home: "{{ garage_data_dir }}"

- name: Create Garage directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: garage
    group: garage
    mode: "0755"
  loop:
    - "{{ garage_config_dir }}"
    - "{{ garage_data_dir }}"
    - "{{ garage_metadata_dir }}"

- name: Deploy Garage configuration
  ansible.builtin.template:
    src: garage.toml.j2
    dest: "{{ garage_config_path }}"
    owner: garage
    group: garage
    mode: "0640"

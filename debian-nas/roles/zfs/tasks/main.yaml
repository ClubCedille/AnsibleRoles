---
- name: Configure ZFS apt preferences
  ansible.builtin.include_tasks:
    file: apt_preferences.yaml
    apply:
      become: true

- name: Install ZFS packages
  ansible.builtin.include_tasks:
    file: install.yaml
    apply:
      become: true

- name: Create and configure ZFS pool
  ansible.builtin.include_tasks:
    file: pool.yaml
    apply:
      become: true
  when: zfs_manage_pool | bool

---
- name: Refresh apt cache
  ansible.builtin.apt:
    update_cache: true
  when: prometheus_install.update_cache | bool
  become: true

- name: Install Prometheus prerequisite packages
  ansible.builtin.apt:
    name: "{{ prometheus_install.prereq_packages }}"
    state: present
  when: prometheus_install.prereq_packages | length > 0
  become: true

- name: Create Prometheus group
  ansible.builtin.group:
    name: "{{ prometheus_service.group }}"
    system: true
  become: true

- name: Create Prometheus user
  ansible.builtin.user:
    name: "{{ prometheus_service.user }}"
    group: "{{ prometheus_service.group }}"
    system: true
    shell: /usr/sbin/nologin
    create_home: false
  become: true

- name: Create Prometheus directories
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    owner: "{{ item.owner }}"
    group: "{{ item.group }}"
    mode: "{{ item.mode }}"
  loop:
    - path: "{{ prometheus_paths.install_dir }}"
      owner: root
      group: root
      mode: "0755"
    - path: "{{ prometheus_paths.binary_dir }}"
      owner: root
      group: root
      mode: "0755"
    - path: "{{ prometheus_paths.rules_dir }}"
      owner: "{{ prometheus_service.user }}"
      group: "{{ prometheus_service.group }}"
      mode: "0755"
    - path: "{{ prometheus_paths.data_dir }}"
      owner: "{{ prometheus_service.user }}"
      group: "{{ prometheus_service.group }}"
      mode: "0755"
    - path: "{{ prometheus_paths.archive_download_dir }}"
      owner: root
      group: root
      mode: "0755"
  become: true

- name: Download Prometheus archive
  ansible.builtin.get_url:
    url: "{{ prometheus_install.archive_url }}"
    dest: "{{ prometheus_paths.archive_download_dir }}/{{ prometheus_install.archive_name }}"
    owner: root
    group: root
    mode: "0644"
    checksum: "{{ prometheus_install.archive_checksum if prometheus_install.archive_checksum | length > 0 else omit }}"
  become: true

- name: Extract Prometheus archive
  ansible.builtin.unarchive:
    src: "{{ prometheus_paths.archive_download_dir }}/{{ prometheus_install.archive_name }}"
    dest: "{{ prometheus_paths.install_dir }}"
    remote_src: true
    owner: root
    group: root
    mode: "0755"
    creates: "{{ prometheus_paths.install_dir }}/{{ prometheus_install.extracted_dir }}"
  become: true

- name: Install Prometheus binary
  ansible.builtin.copy:
    src: "{{ prometheus_paths.install_dir }}/{{ prometheus_install.extracted_dir }}/prometheus"
    dest: "{{ prometheus_paths.binary_dir }}/prometheus"
    remote_src: true
    owner: root
    group: root
    mode: "0755"
  become: true

- name: Install Promtool binary
  ansible.builtin.copy:
    src: "{{ prometheus_paths.install_dir }}/{{ prometheus_install.extracted_dir }}/promtool"
    dest: "{{ prometheus_paths.binary_dir }}/promtool"
    remote_src: true
    owner: root
    group: root
    mode: "0755"
  become: true

---
- name: Refresh apt cache
  ansible.builtin.apt:
    update_cache: true
  when: alloy_install.update_cache | bool
  become: true

- name: Install Alloy packages
  ansible.builtin.apt:
    name: "{{ alloy_install.packages }}"
    state: "{{ alloy_install.package_state }}"
  when: alloy_install.packages | length > 0
  become: true

- name: Create Alloy group
  ansible.builtin.group:
    name: "{{ alloy_service.group }}"
    system: true
  become: true

- name: Create Alloy user
  ansible.builtin.user:
    name: "{{ alloy_service.user }}"
    group: "{{ alloy_service.group }}"
    system: true
    shell: /usr/sbin/nologin
    create_home: false
  become: true

- name: Create Alloy directories
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    owner: "{{ item.owner }}"
    group: "{{ item.group }}"
    mode: "{{ item.mode }}"
  loop:
    - path: "{{ alloy_paths.config_dir }}"
      owner: root
      group: root
      mode: "0755"
    - path: "{{ alloy_paths.storage_dir }}"
      owner: "{{ alloy_service.user }}"
      group: "{{ alloy_service.group }}"
      mode: "0755"
  become: true

- name: Download Alloy binary
  ansible.builtin.get_url:
    url: "{{ alloy_install.binary_url }}"
    dest: "{{ alloy_paths.binary }}"
    mode: "0755"
    checksum: "{{ alloy_install.binary_checksum if alloy_install.binary_checksum | length > 0 else omit }}"
  when: alloy_install.binary_url | length > 0
  become: true

---
snmp_exporter_enabled: true
snmp_exporter_supported_distribution: Ubuntu
snmp_exporter_supported_distribution_version: "24.04"

snmp_exporter_install:
  update_cache: true
  prereq_packages:
    - tar
  version: "0.30.1"
  archive_url: "https://github.com/prometheus/snmp_exporter/releases/download/v0.30.1/snmp_exporter-0.30.1.linux-amd64.tar.gz"
  archive_checksum: "026aac4e23447ed593a783eccab9089cd41d77d17c9d2a0ab84398e45a0bb93e"
  archive_name: "snmp_exporter-{{ snmp_exporter_install.version }}.linux-amd64.tar.gz"
  extracted_dir: "snmp_exporter-{{ snmp_exporter_install.version }}.linux-amd64"

snmp_exporter_service:
  name: snmp_exporter
  state: started
  enabled: true
  user: snmp_exporter
  group: snmp_exporter

snmp_exporter_paths:
  install_dir: /opt/snmp_exporter
  archive_download_dir: /tmp
  binary_dir: /usr/local/bin
  config_dir: /etc/snmp_exporter
  config: /etc/snmp_exporter/snmp.yml
  config_template: snmp.yml.j2
  service_unit: /etc/systemd/system/snmp_exporter.service

snmp_exporter_modules:
  if_mib:
    walk:
      - 1.3.6.1.2.1.2
      - 1.3.6.1.2.1.31
    version: 2
    auth: public_v2
snmp_exporter_auths:
  public_v2:
    community: public
    version: 2

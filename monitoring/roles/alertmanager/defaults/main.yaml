---

alertmanager_enabled: true
alertmanager_supported_distribution: Ubuntu
alertmanager_supported_distribution_version: "24.04"

alertmanager_install:
  update_cache: true
  package_state: present
  packages:
    - prometheus-alertmanager

alertmanager_service:
  name: prometheus-alertmanager
  state: started
  enabled: true

alertmanager_paths:
  config: /etc/alertmanager/alertmanager.yml
  config_template: alertmanager.yml.j2

alertmanager_route:
  receiver: default
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 12h

alertmanager_receivers:
  - name: default
    webhook_configs: []
